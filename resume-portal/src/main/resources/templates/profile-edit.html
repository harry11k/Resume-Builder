<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Profile</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
        integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
  <style>
    body {
        background-color: #f8f9fa;
    }
    h1 {
        margin-top: 20px;
        margin-bottom: 30px;
        text-align: center;
    }
    .form-section {
        margin-bottom: 30px;
    }
    table th, table td {
        vertical-align: middle !important;
    }
    table input.form-control {
        width: 100%;
    }
    a {
        margin-left: 10px;
    }
    input[type="submit"] {
        width: 100%;
        background-color: #007BFF;
        color: white;
        font-weight: bold;
    }
  </style>
</head>
<body>
<h1 th:text="${userId} + '\'s Profile'">Profile</h1>
<div class="container">
  <form id="profileForm" th:action="@{/edit}" th:object="${userProfile}" method="post">

    <div class="form-section">
      <label>Select your profile theme</label>
      <select class="form-control" th:field="*{theme}">
        <option th:each="i : ${#numbers.sequence(1, 3)}" th:value="${i}" th:text="${'Theme ' + i}"></option>
      </select>
    </div>

    <div class="form-row form-section">
      <div class="form-group col-md-6">
        <label>First Name</label>
        <input class="form-control" th:field="*{firstName}">
      </div>
      <div class="form-group col-md-6">
        <label>Last Name</label>
        <input class="form-control" th:field="*{lastName}">
      </div>
    </div>

    <div class="form-row form-section">
      <div class="form-group col-md-6">
        <label>Email address</label>
        <input  class="form-control" th:field="*{email}">
      </div>
      <div class="form-group col-md-6">
        <label>Phone</label>
        <input class="form-control" th:field="*{phone}">
      </div>
    </div>

    <div class="form-group form-section">
      <label>Designation</label>
      <input class="form-control" th:field="*{designation}">
    </div>

    <div class="form-group form-section">
      <label>Summary</label>
      <textarea class="form-control" th:field="*{summary}" rows="3"></textarea>
    </div>

    <h3>Experience</h3>
    <table class="table table-bordered table-hover">
      <thead class="thead-light">
      <tr>
        <th>Company</th>
        <th>Designation</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Current Job?</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="job, stat: *{jobs}">
        <td><input class="form-control" th:field="*{jobs[__${stat.index}__].company}"></td>
        <td><input class="form-control" th:field="*{jobs[__${stat.index}__].designation}"></td>
        <td><input type="date" class="form-control" th:field="*{jobs[__${stat.index}__].startDate}"></td>
        <td><input type="date" class="form-control" th:field="*{jobs[__${stat.index}__].endDate}"></td>
        <td class="text-center"><input type="checkbox" th:field="*{jobs[__${stat.index}__].currentJob}"></td>
        <td><a class="btn btn-sm btn-danger" th:href="@{'./delete?type=job&index=' + ${stat.index}}">Delete</a></td>
      </tr>
      </tbody>
    </table>
    <p><a class="btn btn-sm btn-success" href="./edit?add=job">Add Job</a></p>

    <h3>Education</h3>
    <table class="table table-bordered table-hover">
      <thead class="thead-light">
      <tr>
        <th>College</th>
        <th>Qualification</th>
        <th>Summary</th>
        <th>Action</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="education, stat: *{educations}">
        <td><input class="form-control" th:field="*{educations[__${stat.index}__].college}"></td>
        <td><input class="form-control" th:field="*{educations[__${stat.index}__].qualification}"></td>
        <td><input class="form-control" th:field="*{educations[__${stat.index}__].summary}"></td>
        <td><a class="btn btn-sm btn-danger" th:href="@{'./delete?type=education&index=' + ${stat.index}}">Delete</a></td>
      </tr>
      </tbody>
    </table>
    <p><a class="btn btn-sm btn-success" href="./edit?add=education">Add Education</a></p>

    <h3>Skills</h3>
    <table class="table table-bordered table-hover">
      <tbody>
      <tr th:each="skill, stat: *{skills}">
        <td><input class="form-control" th:field="*{skills[__${stat.index}__]}"></td>
        <td><a class="btn btn-sm btn-danger" th:href="@{'./delete?type=skill&index=' + ${stat.index}}">Delete</a></td>
      </tr>
      </tbody>
    </table>
    <p><a class="btn btn-sm btn-success" href="./edit?add=skill">Add Skill</a></p>

    <input type="submit" class="btn btn-primary btn-block mt-4" value="Submit">
  </form>
</div>
</body>
</html>
